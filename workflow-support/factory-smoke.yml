name: Factory Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  issues: read
  pull-requests: read

concurrency:
  group: factory-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      GH_TOKEN: ${{ secrets.GH_AW_AGENT_TOKEN || secrets.GITHUB_TOKEN }}
      GH_AW_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: scripts
          sparse-checkout-cone-mode: false

      - name: Run factory-smoke.sh
        shell: bash
        run: |
          set -o pipefail
          bash scripts/factory-smoke.sh --wait-secs 600 2>&1 | tee /tmp/smoke.log

      - name: Post results to step summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Factory Smoke Test"
            echo ""
            echo "Triggered: \`${{ github.event_name }}\`"
            echo ""
            echo '```'
            cat /tmp/smoke.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
