name: Workflow Lock File Sync

# Runs on pull requests that touch workflow source or lock files.
# Skips cleanly when no relevant files changed.
#
# This is a standard GitHub Actions workflow, not a gh-aw markdown workflow.
# The guard must live outside the compile-and-lock system it validates.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/*.lock.yml"

permissions:
  contents: read

jobs:
  check-lock-sync:
    name: Check workflow lock files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install gh-aw extension
        # gh CLI is pre-installed on ubuntu-latest runners. We install gh-aw so
        # the checker can use `gh aw compile`, preferring --check-only when the
        # installed version supports it.
        run: gh extension install github/gh-aw
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check workflow lock file sync
        run: bash scripts/check-workflow-lock-sync.sh
